apiVersion: apps/v1
kind: Deployment
metadata:
  name: diff
  labels:
    appclass: light
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: diff
  template:
    metadata:
      labels:
        app: diff
        appclass: light
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: diff
          image: 'ghcr.io/ietf-tools/diff:$APP_IMAGE_TAG'
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          envFrom:
            - secretRef:
                name: diff-secrets-env
          env:
            # ensures the pod gets recreated on every deploy:
            - name: 'DEPLOY_UID'
              value: '$DEPLOY_UID'
          startupProbe:
            httpGet:
              port: http
              path: /_ready
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              port: http
              path: /_live
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsUser: 1000
            runAsGroup: 1000
      restartPolicy: Always
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: diff
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: diff
